description: "Claude Harness - 역추적 규칙 효과 측정 (하네스 ON vs OFF)"

# Gemini 설정 (GOOGLE_API_KEY 환경변수 필요)
providers:
  - id: google:gemini-2.5-flash
    label: "Gemini 2.5 Flash"

# 두 프롬프트 변형 비교 (인라인 - 변수 치환 보장)
prompts:
  - id: baseline
    label: "하네스 OFF (기본)"
    raw: "다음 버그를 수정해주세요.\n\n코드:\n{{code}}\n\n에러:\n{{error}}"
  - id: harness
    label: "하네스 ON (역추적 규칙)"
    raw: "버그 수정 전 반드시 아래 역추적을 먼저 수행하세요.\n\n[역추적]\n증상: {에러/문제 1줄}\n경로: {어떤 입력 → 어디를 거쳐 → 여기서 터짐}\n수정 위치: {근본 원인 위치 확정}\n\n→ 수정 위치 확정 후에만 수정 코드 작성. 증상만 땜질하는 수정 금지.\n\n다음 버그를 수정해주세요.\n\n코드:\n{{code}}\n\n에러:\n{{error}}"

# 테스트 케이스 (실제 버그 10개)
tests:
  # 1. 파일 확장자 하드코딩
  - description: "[TC01] 파일 확장자 하드코딩 - M4A 업로드 시 SRT 생성 실패"
    vars:
      code: |
        # stt.py
        def process_audio(audio_path):
            result = transcribe(audio_path)
            srt_path = audio_path.replace('.mp3', '.srt')
            write_srt(result, srt_path)
            return srt_path
      error: "FileNotFoundError: /uploads/voice.m4a.srt 파일 생성 실패"
    assert:
      - type: llm-rubric
        value: "응답이 .replace('.mp3', '.srt') 코드가 M4A 같은 다른 확장자 파일에서 실패하는 이유를 근본 원인으로 식별했는가?"
        provider: google:gemini-2.5-flash
      - type: llm-rubric
        value: "m4a 파일 입력 → replace('.mp3','.srt') 처리 → .m4a.srt 경로 생성 → 파일 없음 에러 순서로 실패 경로를 구체적으로 추적했는가? (수정 코드만 주는 것이 아니라 흐름 설명 필수)"
        provider: google:gemini-2.5-flash

  # 2. Windows 인코딩 충돌
  - description: "[TC02] Windows cp949 vs UTF-8 충돌 (10회 반복 버그)"
    vars:
      code: |
        # runner.py
        result = subprocess.run(
            ['python', 'process.py'],
            capture_output=True,
            encoding='utf-8'
        )
        print(result.stdout)
      error: "UnicodeDecodeError: 'utf-8' codec can't decode byte 0xbf in position 3"
    assert:
      - type: llm-rubric
        value: "응답이 Windows 환경에서 인코딩 불일치(시스템 인코딩 vs 코드에서 강제한 utf-8)가 근본 원인임을 식별했는가?"
        provider: google:gemini-2.5-flash
      - type: llm-rubric
        value: "subprocess 실행 → 프로세스가 cp949로 출력 → 코드가 utf-8로 강제 디코딩 시도 → 불일치 에러 순서로 실패 경로를 구체적으로 추적했는가? (단순히 에러 메시지만 언급하는 것이 아니라 경로 흐름 설명)"
        provider: google:gemini-2.5-flash

  # 3. 부분 수정으로 기존 기능 손실
  - description: "[TC03] 부분 Edit으로 기존 기능 사라짐"
    vars:
      code: |
        # api.py (수정 후)
        @app.route('/upload', methods=['POST'])
        def upload():
            file = request.files['file']
            return save_file(file)

        # 원래 있던 기능들이 사라짐:
        # @app.route('/list') - 파일 목록
        # @app.route('/delete') - 파일 삭제
      error: "404 Not Found: /list, /delete 엔드포인트가 없어졌어요"
    assert:
      - type: llm-rubric
        value: "사라진 /list, /delete 엔드포인트를 복원하는 수정을 제안했는가?"
        provider: google:gemini-2.5-flash
      - type: llm-rubric
        value: "파일 수정 시 기존 코드를 확인하지 않음 → /upload 추가 시 나머지 엔드포인트 덮어씌워짐 → 404 에러 순서로 실패 경로를 추적했는가? (단순 복원 코드만 주는 것이 아니라 왜 사라졌는지 경로 설명)"
        provider: google:gemini-2.5-flash

  # 4. 표준 라이브러리 try 블록 안에 import
  - description: "[TC04] 표준 라이브러리 import를 try 블록 안에 넣음"
    vars:
      code: |
        # processor.py
        def process_text(text):
            try:
                import re
                import json
                result = re.findall(r'\d+', text)
                return json.dumps(result)
            except Exception as e:
                return []
      error: "NameError: name 're' is not defined (다른 함수에서 re 사용 시)"
    assert:
      - type: llm-rubric
        value: "import를 try 블록 안에 넣으면 블록 바깥에서 접근 불가하다는 근본 원인을 식별하고, import를 함수/블록 밖으로 이동하는 수정을 제시했는가?"
        provider: google:gemini-2.5-flash

  # 5. import 누락
  - description: "[TC05] 환경변수 코드 추가했지만 import os 누락"
    vars:
      code: |
        # gui.py
        def run_process():
            env = os.environ.copy()  # 방금 추가한 코드
            env['PYTHONIOENCODING'] = 'utf-8'
            result = subprocess.run(['python', 'run.py'], env=env)
            return result
      error: "NameError: name 'os' is not defined"
    assert:
      - type: llm-rubric
        value: "import os 누락이 근본 원인임을 식별하고, 파일 상단에 import os를 추가하는 수정을 제시했는가?"
        provider: google:gemini-2.5-flash

  # 6. JSON 배열 append 시 덮어쓰기
  - description: "[TC06] JSON 배열에 항목 추가 시 기존 데이터 사라짐"
    vars:
      code: |
        # data.json (수정 전)
        {
          "items": [
            {"id": 1, "name": "기존 항목 A"},
            {"id": 2, "name": "기존 항목 B"}
          ]
        }

        # 수정 후 (문제 발생)
        {
          "items": [
            {"id": 3, "name": "새 항목 C"}
          ]
        }
      error: "기존 항목 A, B가 사라지고 새 항목 C만 남음"
    assert:
      - type: llm-rubric
        value: "기존 항목 A, B를 유지하면서 새 항목 C만 추가하는 방법을 제시했는가? (기존 데이터를 덮어쓰지 않는 방식)"
        provider: google:gemini-2.5-flash

  # 7. TypeScript 타입 일부 위치 누락
  - description: "[TC07] TypeScript 타입값 변경 시 일부 위치 누락"
    vars:
      code: |
        // types.ts - 변경됨
        type Status = 'active' | 'inactive' | 'pending'  // 'pending' 추가

        // service.ts - 아직 구버전
        function updateStatus(status: 'active' | 'inactive') {
            // ...
        }

        // api.ts - 아직 구버전
        const validStatuses = ['active', 'inactive']
      error: "TypeScript 빌드 오류: Type 'pending' is not assignable to type 'active' | 'inactive'"
    assert:
      - type: llm-rubric
        value: "types.ts에 'pending'이 추가되었지만 service.ts와 api.ts가 동기화되지 않은 것이 근본 원인임을 식별하고, 두 파일도 수정하는 방법을 제시했는가?"
        provider: google:gemini-2.5-flash

  # 8. 배치 선택 로직 항상 동일한 결과
  - description: "[TC08] 배치 분석 시 항상 동일한 50개 항목 선택"
    vars:
      code: |
        # batch.py
        def get_unprocessed_items(sheet):
            all_items = sheet.get_all_records()
            # 분석 완료 여부 체크
            unprocessed = [
                item for item in all_items
                if item.get('phase1_score') is None  # 버그: 이 컬럼이 없음
            ]
            return unprocessed[:50]
      error: "매번 실행해도 동일한 50개 항목이 선택됨. 이전에 분석한 항목도 계속 재선택됨."
    assert:
      - type: llm-rubric
        value: "phase1_score 컬럼이 없어서 item.get('phase1_score') is None이 항상 True로 평가된다는 근본 원인을 식별했는가?"
        provider: google:gemini-2.5-flash
      - type: llm-rubric
        value: "get_unprocessed_items 호출 → phase1_score 컬럼 없음 → is None 조건이 모든 항목에서 True → 항상 전체가 미처리로 분류 → 동일 50개 반복 순서로 실패 경로를 구체적으로 추적했는가?"
        provider: google:gemini-2.5-flash

  # 9. API 키 하드코딩
  - description: "[TC09] Python 파일에 API 키 하드코딩"
    vars:
      code: |
        # config.py
        GEMINI_API_KEY = "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
        OPENAI_API_KEY = "sk-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

        def get_client():
            return GeminiClient(api_key=GEMINI_API_KEY)
      error: "GitGuardian 경고: Secret detected in commit abc123f - config.py"
    assert:
      - type: llm-rubric
        value: "하드코딩 자체가 근본 원인이며, 환경변수(os.getenv)로 교체하고 이미 노출된 키는 즉시 폐기해야 한다고 제안했는가?"
        provider: google:gemini-2.5-flash

  # 10. GUI subprocess 실시간 출력 안됨
  - description: "[TC10] GUI에서 subprocess 실시간 출력 안됨 (버퍼링)"
    vars:
      code: |
        # gui.py
        def run_with_output(self):
            process = subprocess.Popen(
                ['python', 'long_task.py'],
                stdout=subprocess.PIPE,
                stderr=subprocess.PIPE
            )
            while True:
                line = process.stdout.readline()
                if not line:
                    break
                self.log_widget.append(line.decode())
      error: "long_task.py가 실행되는 동안 GUI 로그창에 아무것도 안 나오다가, 완료 후 한꺼번에 출력됨"
    assert:
      - type: llm-rubric
        value: "subprocess.PIPE 사용 시 출력이 버퍼에 쌓여 즉시 전달되지 않는다는 근본 원인을 식별했는가?"
        provider: google:gemini-2.5-flash
      - type: llm-rubric
        value: "stdout=PIPE 설정 → 프로세스가 block buffering 모드로 전환 → 출력이 버퍼에 축적 → 프로세스 종료 시 한꺼번에 flush → GUI 업데이트 지연 순서로 실패 경로를 구체적으로 추적했는가?"
        provider: google:gemini-2.5-flash

# 하네스 ON 전용 추가 체크: 역추적 형식 포함 여부
defaultTest:
  options:
    provider: google:gemini-2.5-flash

# 결과 출력
outputPath: results/latest.json
